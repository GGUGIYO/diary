<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f48fb1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ce93d8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9c64a6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bookGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fce4ec;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="0" y="0" width="512" height="512" rx="110" ry="110" fill="url(#bgGrad)" />

  <!-- Subtle inner glow -->
  <rect x="20" y="20" width="472" height="472" rx="95" ry="95" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="4" />

  <!-- Book body (left page) -->
  <rect x="118" y="130" width="125" height="252" rx="12" ry="12" fill="url(#bookGrad)" />
  <!-- Book body (right page) -->
  <rect x="269" y="130" width="125" height="252" rx="12" ry="12" fill="url(#bookGrad)" />

  <!-- Spine -->
  <rect x="240" y="125" width="32" height="262" rx="6" ry="6" fill="#f48fb1" />
  <!-- Spine highlight -->
  <rect x="247" y="125" width="6" height="262" rx="3" ry="3" fill="rgba(255,255,255,0.5)" />

  <!-- Book cover shadow at top -->
  <rect x="118" y="130" width="125" height="10" rx="0" ry="0" fill="rgba(0,0,0,0.06)" />
  <rect x="269" y="130" width="125" height="10" rx="0" ry="0" fill="rgba(0,0,0,0.06)" />

  <!-- Lines on right page -->
  <line x1="287" y1="185" x2="376" y2="185" stroke="#f8bbd0" stroke-width="5" stroke-linecap="round" />
  <line x1="287" y1="210" x2="376" y2="210" stroke="#f8bbd0" stroke-width="5" stroke-linecap="round" />
  <line x1="287" y1="235" x2="376" y2="235" stroke="#f8bbd0" stroke-width="5" stroke-linecap="round" />
  <line x1="287" y1="260" x2="376" y2="260" stroke="#f8bbd0" stroke-width="5" stroke-linecap="round" />
  <line x1="287" y1="285" x2="370" y2="285" stroke="#f8bbd0" stroke-width="5" stroke-linecap="round" />
  <line x1="287" y1="310" x2="362" y2="310" stroke="#f8bbd0" stroke-width="5" stroke-linecap="round" />

  <!-- Lines on left page -->
  <line x1="136" y1="185" x2="225" y2="185" stroke="#f8bbd0" stroke-width="5" stroke-linecap="round" />
  <line x1="136" y1="210" x2="225" y2="210" stroke="#f8bbd0" stroke-width="5" stroke-linecap="round" />
  <line x1="136" y1="235" x2="225" y2="235" stroke="#f8bbd0" stroke-width="5" stroke-linecap="round" />
  <line x1="136" y1="260" x2="225" y2="260" stroke="#f8bbd0" stroke-width="5" stroke-linecap="round" />
  <line x1="136" y1="285" x2="220" y2="285" stroke="#f8bbd0" stroke-width="5" stroke-linecap="round" />
  <line x1="136" y1="310" x2="212" y2="310" stroke="#f8bbd0" stroke-width="5" stroke-linecap="round" />

  <!-- Decorative flower on the left page top area -->
  <!-- Petals -->
  <ellipse cx="181" cy="158" rx="10" ry="18" fill="#f48fb1" transform="rotate(0 181 170)" />
  <ellipse cx="197" cy="162" rx="10" ry="18" fill="#ce93d8" transform="rotate(45 181 170)" />
  <ellipse cx="195" cy="178" rx="10" ry="18" fill="#f48fb1" transform="rotate(90 181 170)" />
  <ellipse cx="181" cy="182" rx="10" ry="18" fill="#ce93d8" transform="rotate(135 181 170)" />
  <ellipse cx="167" cy="178" rx="10" ry="18" fill="#f48fb1" transform="rotate(180 181 170)" />
  <ellipse cx="165" cy="162" rx="10" ry="18" fill="#ce93d8" transform="rotate(225 181 170)" />
  <ellipse cx="169" cy="150" rx="10" ry="18" fill="#f48fb1" transform="rotate(270 181 170)" />
  <ellipse cx="183" cy="150" rx="10" ry="18" fill="#ce93d8" transform="rotate(315 181 170)" />
  <!-- Flower center -->
  <circle cx="181" cy="170" r="11" fill="#ffcc80" />
  <circle cx="181" cy="170" r="6" fill="#ffa726" />

  <!-- Small bookmark ribbon -->
  <polygon points="310,130 326,130 326,165 318,158 310,165" fill="#f06292" />
  <polygon points="310,130 326,130 326,165 318,158 310,165" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" />

  <!-- Small heart on right page -->
  <path d="M340 340 C340 336 334 330 328 336 C322 330 316 336 316 340 C316 346 322 352 328 358 C334 352 340 346 340 340Z" fill="#f48fb1" opacity="0.8" />
</svg>
