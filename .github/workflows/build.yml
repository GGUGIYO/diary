name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK components
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Install Gradle 8.1.1
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.1.1-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/gradle
          echo "/opt/gradle/gradle-8.1.1/bin" >> $GITHUB_PATH

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: Generate icons from icon-512.png
        run: |
          for entry in "48:mipmap-mdpi" "72:mipmap-hdpi" "96:mipmap-xhdpi" "144:mipmap-xxhdpi" "192:mipmap-xxxhdpi"; do
            size="${entry%%:*}"
            dir="${entry##*:}"
            mkdir -p android/app/src/main/res/$dir
            convert icon-512.png -resize ${size}x${size} android/app/src/main/res/$dir/ic_launcher.png
            cp android/app/src/main/res/$dir/ic_launcher.png android/app/src/main/res/$dir/ic_launcher_round.png
          done

      - name: Build APK
        run: gradle assembleDebug
        working-directory: android

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: diary-app
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
