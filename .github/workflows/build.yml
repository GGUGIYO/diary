name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Accept Android licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Install SDK components
        run: $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0"

      # ── 서명 키스토어 영구 보관 ──
      # 처음 빌드 시 키스토어 생성 후 캐시에 저장
      # 이후 빌드는 캐시에서 복원 → 항상 같은 키로 서명 → 재설치 충돌 없음
      - name: Restore keystore from cache
        id: keystore-cache
        uses: actions/cache@v4
        with:
          path: android/app/diary-key.jks
          key: diary-signing-keystore-v1

      - name: Generate keystore (최초 1회만 실행)
        if: steps.keystore-cache.outputs.cache-hit != 'true'
        run: |
          keytool -genkeypair -v \
            -keystore android/app/diary-key.jks \
            -alias diary \
            -keyalg RSA -keysize 2048 -validity 36500 \
            -dname "CN=DiaryApp,O=Personal,C=KR" \
            -storepass "DiaryApp2024!" \
            -keypass  "DiaryApp2024!" \
            -noprompt
          echo "✅ 새 서명 키스토어 생성 완료 (캐시에 저장됩니다)"

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: Generate icons
        run: |
          for entry in "48:mipmap-mdpi" "72:mipmap-hdpi" "96:mipmap-xhdpi" "144:mipmap-xxhdpi" "192:mipmap-xxxhdpi"; do
            size="${entry%%:*}"
            dir="${entry##*:}"
            mkdir -p android/app/src/main/res/$dir
            convert icon-512.png -resize ${size}x${size} android/app/src/main/res/$dir/ic_launcher.png
            cp android/app/src/main/res/$dir/ic_launcher.png android/app/src/main/res/$dir/ic_launcher_round.png
          done

      - name: Install Gradle 8.1.1
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.1.1-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/gradle
          echo "/opt/gradle/gradle-8.1.1/bin" >> $GITHUB_PATH

      - name: Build APK
        run: gradle assembleRelease
        working-directory: android

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: diary-app
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
