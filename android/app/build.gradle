plugins {
    id 'com.android.application'
}

android {
    namespace 'com.diary.myapp'
    compileSdk 34

    defaultConfig {
        applicationId "com.diary.myapp"
        minSdk 24
        targetSdk 34
        versionCode 2
        versionName "2.0"
    }

    // 고정 서명 키 — 같은 키로 서명해야 기존 앱 위에 덮어쓰기 설치 가능
    signingConfigs {
        release {
            storeFile     file("diary-key.jks")
            storePassword "DiaryApp2024!"
            keyAlias      "diary"
            keyPassword   "DiaryApp2024!"
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            signingConfig signingConfigs.release
        }
        debug {
            minifyEnabled false
            // 디버그도 같은 키로 서명 → 재설치 충돌 방지
            signingConfig signingConfigs.release
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
}
